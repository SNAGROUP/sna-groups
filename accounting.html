<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ระบบบัญชี</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h2>📊 ระบบบัญชี</h2>

<!-- ฟอร์มเพิ่มรายการ -->
<div>
  <input type="date" id="date">
  <input type="text" id="name" placeholder="ชื่อ">
  <input type="text" id="account" placeholder="เลขบัญชี">
  <input type="number" id="income" placeholder="เงินเข้า">
  <input type="number" id="expense" placeholder="เงินออก">
  <button onclick="addTransaction()">เพิ่ม</button>
</div>

<br>

<!-- Import Excel -->
<input type="file" id="excelFile">

<br><br>

<button onclick="exportExcel()">Export Excel</button>

<!-- ตาราง -->
<table border="1" id="table">
  <thead>
    <tr>
      <th>วันที่</th>
      <th>ชื่อ</th>
      <th>บัญชี</th>
      <th>เงินเข้า</th>
      <th>เงินออก</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="js/accounting.js"></script>

</body>
</html>
