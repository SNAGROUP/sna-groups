<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>SNA GROUP Portal</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fa;
}

/* Layout */
.container {
  display: flex;
  height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 250px;
  background: #eef2f7;
  padding: 20px;
}

.sidebar h2 {
  font-size: 18px;
  margin-bottom: 20px;
}

.menu {
  margin-top: 10px;
}

.menu a {
  display: block;
  padding: 12px;
  margin-bottom: 8px;
  background: #e2e8f0;
  border-radius: 10px;
  text-decoration: none;
  color: #333;
}

.menu a:hover {
  background: #cbd5f5;
}

/* Main */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  height: 60px;
  background: white;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 0 20px;
  border-bottom: 1px solid #ddd;
}

/* Content */
.content {
  flex: 1;
  background: #fff;
  margin: 20px;
  border-radius: 10px;
  padding: 20px;
}

/* Table */
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border: 1px solid #ddd;
}
</style>

</head>

<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>📊 SNA GROUP</h2>

   <div class="menu">
  <a onclick="loadPage('home')">หน้าหลัก</a>

  <a onclick="loadPage('accounting')">📊 การทำบัญชี</a>
  <a onclick="loadPage('taxid')">🧾 ขอเลขผู้เสียภาษี</a>
  <a onclick="loadPage('house')">🏠 ทะเบียนบ้าน</a>
  <a onclick="loadPage('translation')">🌐 แปลภาษา</a>
  <a onclick="loadPage('landtax')">🏢 ภาษีที่ดินและสิ่งปลูกสร้าง</a>
  <a onclick="loadPage('license')">📄 การขอใบอนุญาต</a>
  <a onclick="loadPage('report')">📋 รายงานถิ่นที่อยู่อาศัย</a>
</div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Header -->
    <div class="header">
      👤 ผู้ใช้งาน
    </div>

    <!-- Content -->
    <div class="content" id="contentArea">
      <h2>ยินดีต้อนรับ</h2>
      <p>เลือกเมนูด้านซ้าย</p>
    </div>

  </div>

</div>

<script>
function loadPage(page){

  const content = document.getElementById("contentArea");

  if(page === "home"){
    content.innerHTML = "<h2>หน้าหลัก</h2>";
  }

  if(page === "accounting"){
    content.innerHTML = `
      <a href="accounting.html">📊 ระบบบัญชี</a>

      <input type="date" id="date">
      <input type="text" id="name" placeholder="ชื่อ">
      <input type="number" id="amount" placeholder="จำนวนเงิน">
      <button onclick="addRow()">เพิ่ม</button>

      <br><br>

      <table>
        <thead>
          <tr>
            <th>วันที่</th>
            <th>ชื่อ</th>
            <th>จำนวนเงิน</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    `;
  }

  if(page === "immigration"){
    content.innerHTML = "<h2>ระบบวีซ่า</h2>";
  }

  if(page === "translation"){
    content.innerHTML = "<h2>แปลเอกสาร</h2>";
  }

}

function addRow(){
  const date = document.getElementById("date").value;
  const name = document.getElementById("name").value;
  const amount = document.getElementById("amount").value;

  const row = `
    <tr>
      <td>${date}</td>
      <td>${name}</td>
      <td>${amount}</td>
    </tr>
  `;

  document.getElementById("tableBody").innerHTML += row;
}
</script>

</body>
</html>
</div>

<script src="js/app.js"></script>

</body>
</html>
